<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d16">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Car Tracker">
  <title>Car Tracker</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Home-specific (mobile-first) ── */
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      padding-bottom: 0;
    }

    .home-wrap {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      padding: 0 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Top bar: greeting + profile switch */
    .home-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: calc(env(safe-area-inset-top, 0px) + 28px) 0 8px;
    }

    .greeting-hi {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .greeting-name {
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.15;
      color: var(--text-primary);
    }

    .greeting-name .wave { -webkit-text-fill-color: initial; }

    /* Profile chip (tap to switch) */
    .profile-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 999px;
      padding: 5px 12px 5px 5px;
      cursor: pointer;
      flex-shrink: 0;
      transition: var(--transition);
    }
    .profile-chip:active { transform: scale(0.96); }

    .profile-chip-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #eceef3;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .profile-chip-avatar svg,
    .profile-chip-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .profile-chip-label { font-size: 0.72rem; color: var(--text-muted); line-height: 1.1; }
    .profile-chip-name  { font-size: 0.85rem; font-weight: 600; color: var(--text-primary); }
    .profile-chip-caret { font-size: 0.7rem; color: var(--text-muted); margin-left: 2px; }

    /* Hero logo strip */
    .home-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 26px 0 18px;
    }
    .home-brand-icon {
      width: 46px; height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, #1a1a3e 0%, #0d0d22 100%);
      border: 1px solid rgba(245, 197, 24, 0.25);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      box-shadow: 0 8px 24px rgba(245, 197, 24, 0.12);
    }
    .home-brand-title { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.3px; }
    .home-brand-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 1px; }

    /* Menu list — big tap targets, horizontal rows */
    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 4px;
    }

    .menu-card {
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: inherit;
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .menu-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
    }
    .menu-card.fuel::before    { background: var(--color-gold-gradient); }
    .menu-card.maint::before   { background: var(--color-blue-gradient); }
    .menu-card.history::before { background: var(--color-teal-gradient); }
    .menu-card:active { transform: scale(0.98); border-color: rgba(255,255,255,0.12); }

    .menu-card-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .menu-card.fuel    .menu-card-icon { background: rgba(245,197,24,0.12); color: var(--color-gold); }
    .menu-card.maint   .menu-card-icon { background: rgba(74,144,217,0.12); color: var(--color-blue); }
    .menu-card.history .menu-card-icon { background: rgba(0,201,177,0.12); color: var(--color-teal); }

    .menu-card-body { flex: 1; min-width: 0; }
    .menu-card-title { font-size: 1.02rem; font-weight: 700; margin-bottom: 3px; }
    .menu-card-desc { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.4; }
    .menu-card-arrow { color: var(--text-muted); font-size: 0.9rem; flex-shrink: 0; }

    /* Footer */
    .home-footer {
      margin-top: auto;
      text-align: center;
      padding: 24px 16px calc(env(safe-area-inset-bottom, 0px) + 20px);
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    /* Wider screens: keep it comfortably centered, cards a touch taller */
    @media (min-width: 620px) {
      .greeting-name { font-size: 1.9rem; }
    }
  </style>
</head>
<body>

  <div class="home-wrap">

    <!-- Top: greeting + profile switch -->
    <div class="home-top">
      <div>
        <div class="greeting-hi">สวัสดี <span class="wave">👋</span></div>
        <div class="greeting-name" id="greeting-name">—</div>
      </div>
      <div class="profile-chip" id="profile-chip" onclick="switchProfile()">
        <span class="profile-chip-avatar" id="chip-avatar"></span>
        <div>
          <div class="profile-chip-label">ผู้ใช้งาน</div>
          <div class="profile-chip-name" id="chip-name">—</div>
        </div>
        <i class="fa-solid fa-angle-down profile-chip-caret"></i>
      </div>
    </div>

    <!-- Brand strip -->
    <div class="home-brand">
      <div class="home-brand-icon">🚗</div>
      <div>
        <div class="home-brand-title">Car Tracker</div>
        <div class="home-brand-sub">ค่าใช้จ่ายรถยนต์ในครอบครัว</div>
      </div>
    </div>

    <!-- Menu -->
    <div class="menu-list">

      <a class="menu-card fuel" href="fuel.html">
        <div class="menu-card-icon"><i class="fa-solid fa-gas-pump"></i></div>
        <div class="menu-card-body">
          <div class="menu-card-title">เติมน้ำมัน</div>
          <div class="menu-card-desc">บันทึกการเติม คำนวณ กม./ลิตร อัตโนมัติ</div>
        </div>
        <i class="fa-solid fa-chevron-right menu-card-arrow"></i>
      </a>

      <a class="menu-card maint" href="maintenance.html">
        <div class="menu-card-icon"><i class="fa-solid fa-wrench"></i></div>
        <div class="menu-card-body">
          <div class="menu-card-title">ซ่อมบำรุง</div>
          <div class="menu-card-desc">บันทึกการซ่อม/เปลี่ยนอะไหล่ หลายรายการต่อครั้ง</div>
        </div>
        <i class="fa-solid fa-chevron-right menu-card-arrow"></i>
      </a>

      <a class="menu-card history" href="history.html">
        <div class="menu-card-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
        <div class="menu-card-body">
          <div class="menu-card-title">ประวัติ &amp; รายงาน</div>
          <div class="menu-card-desc">สรุปรายเดือน กราฟย้อนหลัง 6 เดือน และค้นหา</div>
        </div>
        <i class="fa-solid fa-chevron-right menu-card-arrow"></i>
      </a>

    </div>

    <div class="home-footer">
      Nissan Almera &amp; Honda Jazz · Powered by Google Sheets
    </div>

  </div>

  <script src="js/app.js"></script>
  <script>
    // On first launch this shows the profile picker; afterwards it just
    // greets the remembered person (with a tap-to-switch chip).
    window.addEventListener('load', () => {
      ensureProfile(renderHomeGreeting);
    });

    function renderHomeGreeting() {
      document.getElementById('greeting-name').textContent = currentProfile.name;
      document.getElementById('chip-name').textContent = currentProfile.name;

      const avatar = document.getElementById('chip-avatar');
      avatar.innerHTML = profileAvatarHTML(currentProfile);
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/car-tracker/sw.js');
    }
  </script>
</body>
</html>
